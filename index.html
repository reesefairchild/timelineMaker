<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏳</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container-main">
  <div class="header">
    <h1>timeline studio</h1>
    <p>Create timelines with events defined by name, start month, end month, and color.
    Download your timeline as a PNG image or save/load timelines as JSON files.</p>
  </div>

  <div class="form-section">
    <h2>➕ Add Event</h2>
    <form id="eventForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">Event Name</label>
          <input type="text" id="name" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="start">Start</label>
          <input type="month" id="start" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="end">End</label>
          <input type="month" id="end" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="color">Color</label>
          <input type="color" id="color" value="#d97706" autocomplete="off">
        </div>
      </div>
      <button type="submit" class="btn-primary">Add Event</button>
    </form>
  </div>

  <div class="timeline-section">
    <div class="timeline-header">
      <h2>📊 Your Timeline</h2>
    </div>
    <div id="timeline">
      <div class="timeline-empty">No events yet.</div>
    </div>
    <div class="controls">
      <button id="saveBtn" class="btn-success">Download PNG</button>
      <button id="saveJsonBtn" class="btn-info">Export JSON</button>
      <button id="loadJsonBtn" class="btn-info">Import JSON</button>
      <input type="file" id="loadJsonInput" accept=".json">
    </div>
  </div>
</div>

<footer>
  <p><strong>For best results, use on desktop browsers.</strong></p>
</footer>

<script>
const events = [];

document.getElementById("eventForm").addEventListener("submit", e => {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const color = document.getElementById("color").value;
  if (!name || !start || !end) return;
  const idx = events.findIndex(ev => ev.name === name);
  if (idx !== -1) events.splice(idx, 1);
  events.push({ name, start, end, color });
  renderTimeline();
  e.target.reset();
  document.getElementById("color").value = "#d97706";
});

function monthIndex(date) {
  const [y, m] = date.split("-").map(Number);
  return y * 12 + m;
}

function renderTimeline() {
  const timelineEl = document.getElementById("timeline");
  timelineEl.innerHTML = "";
  if (!events.length) {
    timelineEl.innerHTML = '<div class="timeline-empty">No events yet.</div>';
    return;
  }

  const min = Math.min(...events.map(e => monthIndex(e.start)));
  const max = Math.max(...events.map(e => monthIndex(e.end)));
  const range = max - min || 1;

  events.forEach((e, i) => {
    const startIdx = monthIndex(e.start) - min;
    const endIdx = monthIndex(e.end) - min;
    const width = ((endIdx - startIdx) / range) * 100;
    const left = (startIdx / range) * 100;

    const div = document.createElement("div");
    div.className = "event";
    div.innerHTML = `
      <div class="event-label">
        <span>${e.name}</span>
        <span>${e.start} → ${e.end}</span>
      </div>
      <div class="event-bar">
        <div class="event-bar-fill" style="position:absolute; left:${left}%; width:${width}%; background:${e.color}; height:100%;"></div>
      </div>
      <button class="btn-danger">Delete</button>
    `;

    div.querySelector("button").onclick = () => {
      events.splice(i, 1);
      renderTimeline();
    };

    timelineEl.appendChild(div);
  });
}

// Simple canvas-based export
document.getElementById("saveBtn").addEventListener("click", () => {
  if (!events.length) {
    alert("Nothing to export");
    return;
  }

  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "Exporting...";

  const canvas = document.createElement("canvas");
  canvas.width = 1000;
  canvas.height = 150 + events.length * 70;

  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Title
  ctx.fillStyle = "#000000";
  ctx.font = "24px Arial";
  ctx.fillText("Timeline", 20, 40);

  // Calculate date range
  const min = Math.min(...events.map(e => monthIndex(e.start)));
  const max = Math.max(...events.map(e => monthIndex(e.end)));
  const range = max - min || 1;

  // Draw events
  events.forEach((e, i) => {
    const startIdx = monthIndex(e.start) - min;
    const endIdx = monthIndex(e.end) - min;
    const barWidth = ((endIdx - startIdx) / range) * 800;
    const barLeft = (startIdx / range) * 800 + 120;
    const barTop = 90 + i * 70;

    // Event name
    ctx.fillStyle = "#000000";
    ctx.font = "bold 14px Arial";
    ctx.fillText(e.name, 20, barTop - 10);

    // Date range
    ctx.font = "12px Arial";
    ctx.fillStyle = "#666666";
    ctx.fillText(`${e.start} → ${e.end}`, 20, barTop + 15);

    // Bar
    ctx.fillStyle = e.color;
    ctx.fillRect(barLeft, barTop, Math.max(barWidth, 5), 30);
  });

  // Download
  const link = document.createElement("a");
  link.href = canvas.toDataURL("image/png");
  link.download = "timeline.png";
  link.click();

  btn.disabled = false;
  btn.textContent = "Download PNG";
});

document.getElementById("saveJsonBtn").addEventListener("click", () => {
  if (!events.length) {
    alert("No events to save");
    return;
  }
  const blob = new Blob([JSON.stringify(events, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "timeline.json";
  a.click();
});

document.getElementById("loadJsonBtn").addEventListener("click", () => {
  document.getElementById("loadJsonInput").click();
});

document.getElementById("loadJsonInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw new Error("Invalid format");
      events.length = 0;
      data.forEach(ev => events.push(ev));
      renderTimeline();
      alert("Loaded successfully");
    } catch {
      alert("Failed to load file");
    }
  };
  reader.readAsText(file);
});
</script>

</body>
</html>
